name: Optimize All Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Sharp
        run: |
          mkdir -p /tmp/sharp-tool
          cd /tmp/sharp-tool
          npm init -y
          npm install sharp

      - name: Convert ALL images in public/ to WebP (smart recursive)
        run: |
          node --input-type=module << 'EOF'
          import { createRequire } from 'module';
          const require = createRequire('/tmp/sharp-tool/package.json');
          const sharp = require('sharp');
          import {
            readdirSync, existsSync, unlinkSync,
            statSync, mkdirSync
          } from 'fs';
          import { join, extname, basename, dirname } from 'path';

          // ── Folder-specific settings ──────────────────────────────────────────
          const PROFILE = {
            'public/images/authors': {
              width: 120, height: 120, fit: 'cover',
              quality: 100, lossless: true,
              sharpen: { sigma: 1.3, m1: 1.8, m2: 0.8, x1: 2, y2: 10, y3: 20 },
            },
            'public/images/slider': {
              width: 1920, height: 720, fit: 'cover',
              quality: 100, lossless: true,
              sharpen: { sigma: 1.0, m1: 1.4, m2: 0.6, x1: 2, y2: 10, y3: 20 },
            },
            'public/images/posts': {
              width: 1200, height: null, fit: 'inside',
              quality: 95, lossless: false,
              sharpen: { sigma: 0.9, m1: 1.3, m2: 0.55, x1: 2, y2: 10, y3: 20 },
            },
          };

          // Default profile — public/ ඇතුළේ වෙන ඕනෑම folder/file
          const DEFAULT_PROFILE = {
            width: 1920, height: null, fit: 'inside',
            quality: 95, lossless: false,
            sharpen: { sigma: 0.9, m1: 1.3, m2: 0.55, x1: 2, y2: 10, y3: 20 },
          };

          // ── Recursive file finder ────────────────────────────────────────────
          function findImages(dir) {
            const results = [];
            if (!existsSync(dir)) return results;
            for (const entry of readdirSync(dir, { withFileTypes: true })) {
              const full = join(dir, entry.name);
              if (entry.isDirectory()) {
                results.push(...findImages(full));
              } else if (/\.(jpg|jpeg|png)$/i.test(entry.name)) {
                results.push(full);
              }
            }
            return results;
          }

          // ── Get best matching profile ────────────────────────────────────────
          function getProfile(filePath) {
            // Longest matching prefix wins
            let best = null, bestLen = 0;
            for (const [key, prof] of Object.entries(PROFILE)) {
              if (filePath.startsWith(key) && key.length > bestLen) {
                best = prof;
                bestLen = key.length;
              }
            }
            return best ?? DEFAULT_PROFILE;
          }

          // ── Convert one image ────────────────────────────────────────────────
          async function convert(input) {
            const out = input.replace(/\.(jpg|jpeg|png)$/i, '.webp');
            const prof = getProfile(input);

            try {
              let pipe = sharp(input, { sequentialRead: true })
                .resize(
                  prof.width,
                  prof.height ?? undefined,
                  {
                    fit: prof.fit,
                    kernel: sharp.kernel.lanczos3,
                    withoutEnlargement: true,
                  }
                )
                .sharpen(prof.sharpen)
                .modulate({ saturation: 1.12, brightness: 1.02 })
                .linear(1.06, -6)
                .webp({
                  quality: prof.quality,
                  lossless: prof.lossless,
                  effort: 6,
                  smartSubsample: true,
                });

              await pipe.toFile(out);

              if (existsSync(out) && statSync(out).size > 0) {
                unlinkSync(input);
                console.log(`✅  ${input}  →  ${out}`);
              } else {
                console.error(`❌  WebP verify failed, original kept: ${input}`);
              }
            } catch (e) {
              console.error(`❌  Conversion failed (original kept): ${input}  —  ${e.message}`);
            }
          }

          // ── Main ─────────────────────────────────────────────────────────────
          const images = findImages('public');
          console.log(`Found ${images.length} image(s) to convert…`);
          for (const img of images) {
            await convert(img);
          }
          console.log('Done.');
          EOF

      - name: Commit results
        run: |
          git config user.name  "actions-user"
          git config user.email "actions@github.com"
          git add -A public/
          git diff --staged --quiet && echo "Nothing to commit." || \
            git commit -m "Auto: convert images to WebP + update all code references"
          git push

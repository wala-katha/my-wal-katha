name: Optimize All Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Sharp latest
        run: |
          mkdir -p /tmp/sharp-tool
          cd /tmp/sharp-tool
          npm init -y
          npm install sharp@latest

      - name: Convert JPG/PNG → WebP (world-best clarity)
        run: |
          node --input-type=module << 'EOF'
          import { createRequire } from 'module';
          const require = createRequire('/tmp/sharp-tool/package.json');
          const sharp = require('sharp');
          import { readdirSync, existsSync, unlinkSync, statSync } from 'fs';
          import { join } from 'path';

          // ═══════════════════════════════════════════════════════════════════
          // Official Sharp API v0.34+ — සොයාගත් සියල්ල apply කළා
          //
          // lossless: true
          //   → pixels 100% unchanged, mathematically exact
          //   → quality parameter irrelevant (ignored in lossless)
          //   → smartSubsample irrelevant (lossy only)
          //   → preset irrelevant (lossy only)
          //
          // effort: 6
          //   → lossless mode: file size optimize කරනවා, pixels same
          //   → lossy mode: compression aggressive (blur risk) — අපි use නොකරන්නෙ
          //
          // smartDeblock: true  [v0.34.0+ නව feature]
          //   → low contrast edges (borders, text edges) හි
          //     JPEG artifact remove → clarity increase
          //   → lossless encode කිරීමට පෙර source cleanup
          //
          // exact: true
          //   → transparent pixels (PNG alpha) හි color data preserve
          //   → logo/icon type images සඳහා critical
          //
          // keepIccProfile()
          //   → source image color profile (Adobe RGB, P3, etc.) preserve
          //   → browser හි exact color render
          //   → .keepMetadata() වලට වඩා precise — ICC only
          //
          // autoOrient()  [v0.34.0+ නව feature]
          //   → EXIF orientation data read කර physically rotate
          //   → phone camera photos upside-down/sideways issue fix
          //
          // resize: withoutEnlargement: true
          //   → source pixels කිසිවිටෙකත් upscale නොකරන්නෙ
          //   → source > limit නම් පමණක් resize
          //
          // webp re-encode: නැහැ
          //   → generation loss zero
          // ═══════════════════════════════════════════════════════════════════

          const PROFILE = {

            'public/images/authors': {
              // Author face photos — pixel-perfect, original size
              // Phone camera photos EXIF orientation fix included
              maxWidth:  null,   // resize නැහැ — original pixels
              maxHeight: null,
              lossless:  true,
              effort:    6,
              smartDeblock: true,
              exact:     true,
            },

            'public/images/slider': {
              // Hero/banner — 4K ready, full quality
              maxWidth:  3840,   // 4K width max
              maxHeight: null,
              lossless:  true,
              effort:    6,
              smartDeblock: true,
              exact:     false,
            },

            'public/images/posts': {
              // Post thumbnails — HD, lossless
              maxWidth:  1600,
              maxHeight: null,
              lossless:  true,
              effort:    6,
              smartDeblock: true,
              exact:     false,
            },
          };

          const DEFAULT_PROFILE = {
            maxWidth:  3840,
            maxHeight: null,
            lossless:  true,
            effort:    6,
            smartDeblock: true,
            exact:     false,
          };

          // ── Recursive finder — JPG/PNG ONLY ──────────────────────────────
          function findImages(dir) {
            const results = [];
            if (!existsSync(dir)) return results;
            for (const entry of readdirSync(dir, { withFileTypes: true })) {
              const full = join(dir, entry.name);
              if (entry.isDirectory()) {
                results.push(...findImages(full));
              } else if (/\.(jpg|jpeg|png)$/i.test(entry.name)) {
                results.push(full);
              }
            }
            return results;
          }

          // ── Profile matcher ───────────────────────────────────────────────
          function getProfile(filePath) {
            let best = null, bestLen = 0;
            for (const [key, prof] of Object.entries(PROFILE)) {
              if (filePath.startsWith(key) && key.length > bestLen) {
                best = prof; bestLen = key.length;
              }
            }
            return best ?? DEFAULT_PROFILE;
          }

          // ── Convert ───────────────────────────────────────────────────────
          async function convert(input) {
            const out = input.replace(/\.(jpg|jpeg|png)$/i, '.webp');
            const prof = getProfile(input);

            try {
              const meta = await sharp(input).metadata();
              const srcW = meta.width  ?? 0;
              const srcH = meta.height ?? 0;

              // ── Pipeline ────────────────────────────────────────────────
              let pipe = sharp(input)
                // EXIF rotation fix — phone photos
                .autoOrient()
                // ICC color profile preserve — color accuracy
                .keepIccProfile();

              // Resize — source > limit නම් ONLY
              const doW = prof.maxWidth  && srcW > prof.maxWidth;
              const doH = prof.maxHeight && srcH > prof.maxHeight;

              if (doW || doH) {
                pipe = pipe.resize(
                  prof.maxWidth  ?? undefined,
                  prof.maxHeight ?? undefined,
                  {
                    fit:                'inside',
                    kernel:             sharp.kernel.lanczos3,
                    withoutEnlargement: true,
                  }
                );
              }

              // ── WebP encode — official best settings ────────────────────
              pipe = pipe.webp({
                lossless:     true,    // pixel perfect
                effort:       6,       // best file size, pixels unchanged
                smartDeblock: true,    // edge artifact cleanup [v0.34+]
                exact:        prof.exact,  // alpha channel color preserve
                // smartSubsample: irrelevant (lossless only)
                // nearLossless: irrelevant (lossless overrides)
                // quality: irrelevant (lossless ignores it)
                // preset: irrelevant (lossy only)
              });

              await pipe.toFile(out);

              // ── Verify ──────────────────────────────────────────────────
              if (!existsSync(out) || statSync(out).size === 0) {
                console.error(`❌  Verify failed, kept: ${input}`);
                if (existsSync(out)) unlinkSync(out);
                return;
              }

              const inKB  = (statSync(input).size / 1024).toFixed(0);
              const outKB = (statSync(out).size   / 1024).toFixed(0);
              const pct   = (((statSync(input).size - statSync(out).size) / statSync(input).size) * 100).toFixed(1);

              unlinkSync(input);
              console.log(`✅  [${srcW}×${srcH}] ${inKB}KB → ${outKB}KB (${pct}% smaller) — ${out}`);

            } catch (e) {
              console.error(`❌  Failed (original kept): ${input} — ${e.message}`);
              if (existsSync(out)) unlinkSync(out);
            }
          }

          // ── Main ──────────────────────────────────────────────────────────
          const images = findImages('public');
          if (images.length === 0) {
            console.log('ℹ️  No JPG/PNG found — nothing to do.');
          } else {
            console.log(`\n🖼  Found ${images.length} image(s)…\n`);
            for (const img of images) await convert(img);
            console.log('\n✨  Done.\n');
          }
          EOF

      - name: Commit
        run: |
          git config user.name  "actions-user"
          git config user.email "actions@github.com"
          git add -A public/
          git diff --staged --quiet && echo "Nothing to commit." || \
            git commit -m "Auto: JPG/PNG → lossless WebP (smartDeblock + ICC + autoOrient)"
          git push

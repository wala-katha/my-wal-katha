name: Optimize All Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Sharp in temp folder
        run: |
          mkdir -p /tmp/sharp-tool
          cd /tmp/sharp-tool
          npm init -y
          npm install sharp

      - name: Auto-detect, convert & update all references
        run: |
          node --input-type=module << 'EOF'
          import { createRequire } from 'module';
          const require = createRequire('/tmp/sharp-tool/package.json');
          const sharp = require('sharp');
          import { readdirSync, existsSync, unlinkSync, statSync, readFileSync, writeFileSync } from 'fs';

          // 🛡️ Favicon/icon files — browser compatibility සඳහා convert නොකරන files
          const SKIP_REGEX = /(favicon|apple-touch-icon|icon-\d+|mstile|safari-pinned-tab|og-image)/i;

          const authorSharpen  = { sigma: 1.2, m1: 1.5, m2: 0.7, x1: 2, y2: 10, y3: 20 };
          const sliderSharpen  = { sigma: 0.8, m1: 1.2, m2: 0.5, x1: 2, y2: 10, y3: 20 };
          const postSharpen    = { sigma: 0.8, m1: 1.2, m2: 0.5, x1: 2, y2: 10, y3: 20 };
          const logoSharpen    = { sigma: 1.5, m1: 2.0, m2: 0.8, x1: 2, y2: 10, y3: 20 };
          const genericSharpen = { sigma: 0.6, m1: 1.0, m2: 0.4, x1: 2, y2: 10, y3: 20 };

          // 🧠 SMART CONFIG: folder එක අනුව හරි settings auto-select කරනවා
          function getImageConfig(relPath) {
            const lower = relPath.toLowerCase();
            if (lower.includes('/authors/')) {
              return { width: 120, height: 120, fit: 'cover', quality: 100, lossless: true, sharpen: authorSharpen };
            }
            if (lower.includes('/slider/')) {
              return { width: 900, height: 338, fit: 'cover', quality: 100, lossless: true, sharpen: sliderSharpen };
            }
            if (lower.includes('/posts/')) {
              return { width: 400, height: null, fit: 'inside', quality: 90, lossless: false, sharpen: postSharpen };
            }
            if (lower === 'images/logo.png') {
              return {
                width: 300, height: 50, fit: 'contain', quality: 100, lossless: true, sharpen: logoSharpen,
                background: { r: 0, g: 0, b: 0, alpha: 0 },
              };
            }
            // 🆕 FALLBACK: අනාගතයේ add කරන ඕනෑම අලුත් folder/image එකක් —
            // dimensions නොදන්නා නිසා resize කරන්නේ නැහැ, format + light compress පමණයි
            return { width: null, height: null, fit: null, quality: 92, lossless: false, sharpen: genericSharpen };
          }

          function listAllFiles(baseDir) {
            if (!existsSync(baseDir)) return [];
            return readdirSync(baseDir, { recursive: true })
              .map((rel) => baseDir + '/' + rel)
              .filter((full) => {
                try { return statSync(full).isFile(); } catch { return false; }
              });
          }

          // ============================================================
          // STEP 1: public/ folder එක මුළුමනින්ම (subfolders ඇතුළුව)
          // scan කර JPG/PNG සියල්ල හොයාගැනීම
          // ============================================================
          const allPublicFiles = listAllFiles('public');
          const imageFiles = allPublicFiles.filter((f) => /\.(jpe?g|png)$/i.test(f));

          const convertedMap = []; // { oldRel, newRel }

          for (const inputFull of imageFiles) {
            const baseName = inputFull.split('/').pop();
            if (SKIP_REGEX.test(baseName)) {
              console.log('Skipped (protected file):', inputFull);
              continue;
            }

            const relPath = inputFull.replace(/^public\//, '');
            const outputFull = inputFull.replace(/\.(jpe?g|png)$/i, '.webp');
            const newRelPath = relPath.replace(/\.(jpe?g|png)$/i, '.webp');
            const cfg = getImageConfig(relPath);

            try {
              let pipeline = sharp(inputFull);

              if (cfg.width) {
                pipeline = pipeline.resize(cfg.width, cfg.height ?? undefined, {
                  fit: cfg.fit,
                  background: cfg.background,
                  kernel: sharp.kernel.lanczos3,
                  withoutEnlargement: true,
                });
              }

              await pipeline
                .sharpen(cfg.sharpen)
                .modulate({ saturation: 1.1, brightness: 1.02 })
                .linear(1.05, -5)
                .webp({ quality: cfg.quality, lossless: cfg.lossless, effort: 6 })
                .toFile(outputFull);

              if (existsSync(outputFull) && statSync(outputFull).size > 0) {
                unlinkSync(inputFull);
                convertedMap.push({ oldRel: relPath, newRel: newRelPath });
                console.log('Converted:', relPath, '->', newRelPath);
              } else {
                console.error('WebP verification failed, keeping original:', inputFull);
              }
            } catch (e) {
              console.error('Failed (original kept):', inputFull, e.message);
            }
          }

          console.log(`\n✅ Total converted: ${convertedMap.length} images\n`);

          // ============================================================
          // STEP 2: src/ සහ public/ තුල ඇති code files වල පරණ
          // .jpg/.png path references ස්වයංක්‍රීයව .webp බවට update කිරීම
          // ============================================================
          const TEXT_EXT_REGEX = /\.(astro|md|mdx|json|ts|tsx|js|jsx|css|html|jsonc|toml)$/i;
          const codeFiles = [...listAllFiles('src'), ...listAllFiles('public')]
            .filter((f) => TEXT_EXT_REGEX.test(f));

          let updatedFilesCount = 0;

          for (const file of codeFiles) {
            let content;
            try {
              content = readFileSync(file, 'utf8');
            } catch {
              continue;
            }

            let changed = false;
            for (const { oldRel, newRel } of convertedMap) {
              if (content.includes(oldRel)) {
                content = content.split(oldRel).join(newRel);
                changed = true;
              }
            }

            if (changed) {
              writeFileSync(file, content, 'utf8');
              updatedFilesCount++;
              console.log('Updated references in:', file);
            }
          }

          console.log(`\n✅ Total source files updated: ${updatedFilesCount}\n`);
          EOF

      - name: Commit optimized images and updated references
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: convert images to WebP + update all code references"
          git push

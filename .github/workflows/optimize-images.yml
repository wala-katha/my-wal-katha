name: Optimize Author Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Sharp in temp folder
        run: |
          mkdir -p /tmp/sharp-tool
          cd /tmp/sharp-tool
          npm init -y
          npm install sharp

      - name: Resize all images
        run: |
          node --input-type=module << 'EOF'
          import { createRequire } from 'module';
          const require = createRequire('/tmp/sharp-tool/package.json');
          const sharp = require('sharp');
          import { readdirSync, existsSync } from 'fs';

          // ✅ උපරිම පැහැදිලි බව සඳහා sharpen settings
          const authorSharpen = { sigma: 1.2, m1: 1.5, m2: 0.7, x1: 2, y2: 10, y3: 20 };
          const sliderSharpen = { sigma: 0.8, m1: 1.2, m2: 0.5, x1: 2, y2: 10, y3: 20 };
          const logoSharpen   = { sigma: 1.5, m1: 2.0, m2: 0.8, x1: 2, y2: 10, y3: 20 };

          const folders = [
            {
              dir: 'public/images/authors',
              width: 120, height: 120,
              quality: 100, lossless: true,
              sharpen: authorSharpen,
            },
            {
              dir: 'public/images/slider',
              width: 1200, height: 450,
              quality: 100, lossless: true,
              sharpen: sliderSharpen,
            },
          ];

          for (const { dir, width, height, quality, lossless, sharpen } of folders) {
            if (!existsSync(dir)) continue;
            for (const file of readdirSync(dir)) {
              if (/\.(jpg|jpeg|png)$/i.test(file)) {
                const input = dir + '/' + file;
                const out = dir + '/' + file.replace(/\.[^.]+$/, '.webp');
                await sharp(input)
                  .resize(width, height, {
                    fit: 'cover',
                    kernel: sharp.kernel.lanczos3,
                    withoutEnlargement: true,
                  })
                  // ✅ Unsharp mask — edges sharp කිරීම
                  .sharpen(sharpen)
                  // ✅ Vibrance + clarity boost
                  .modulate({ saturation: 1.1, brightness: 1.02 })
                  // ✅ Contrast micro boost
                  .linear(1.05, -5)
                  .webp({ quality, lossless, effort: 6 })
                  .toFile(out);
                console.log('Done:', input, '->', out);
              }
            }
          }

          // ✅ Logo — aspect ratio 300x50 exact + maximum sharpness
          if (existsSync('public/images/logo.png')) {
            await sharp('public/images/logo.png')
              .resize(300, 50, {
                fit: 'contain',
                background: { r: 0, g: 0, b: 0, alpha: 0 },
                kernel: sharp.kernel.lanczos3,
              })
              .sharpen(logoSharpen)
              .modulate({ saturation: 1.1, brightness: 1.02 })
              .linear(1.05, -5)
              .webp({ quality: 100, lossless: true, effort: 6 })
              .toFile('public/images/logo.webp');
            console.log('Done: logo.png -> logo.webp');
          }
          EOF

      - name: Commit optimized images
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/images/authors/*.webp || true
          git add public/images/slider/*.webp || true
          git add public/images/logo.webp || true
          git diff --staged --quiet || git commit -m "Auto: 4K-sharp WebP optimize all images"
          git push

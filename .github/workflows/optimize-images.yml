name: Optimize All Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Sharp latest
        run: |
          mkdir -p /tmp/sharp-tool
          cd /tmp/sharp-tool
          npm init -y
          npm install sharp@latest

      - name: Convert JPG/PNG → WebP (world-best clarity)
        run: |
          node --input-type=module << 'EOF'
          import { createRequire } from 'module';
          const require = createRequire('/tmp/sharp-tool/package.json');
          const sharp = require('sharp');
          import { readdirSync, existsSync, unlinkSync, statSync } from 'fs';
          import { join } from 'path';

          // ═══════════════════════════════════════════════════════════════════
          // FIX 1: Authors — maxWidth 400px enforce කළා
          //   → 120×120 circle display → 400px source more than enough
          //   → 3MB+ phone photos → ~30KB ට reduce
          //   → PageSpeed LCP score improvement
          //
          // FIX 2: Slider — maxHeight 600px enforce කළා
          //   → FeaturedSlider.astro: width=1200 height=450 (8:3 ratio)
          //   → Tall source images CLS (layout shift) fix
          //   → aspect ratio lock: fit:'cover' → 1200×450 exactly
          //
          // FIX 3: Posts — maxHeight 400px enforce කළා
          //   → Posts display: width=445 height=230 (≈ 1.93:1)
          //   → Tall portrait images distortion fix
          //   → SEO: correct aspect ratio for OG/Twitter card images
          //
          // FIX 4: Already-WebP skip logic added
          //   → workflow_dispatch duplicate run protection
          //   → only JPG/PNG processed, existing WebP untouched
          //
          // FIX 5: Commit message timestamp added
          //   → debugging easier, audit trail clear
          // ═══════════════════════════════════════════════════════════════════

          const PROFILE = {

            'public/images/authors': {
              // ✅ FIX 1: Phone camera photos — face visible, small file
              // Display size: 120×120 circle
              // Source limit: 400px — 3× retina display සඳහා ප්‍රමාණවත්
              maxWidth:   400,
              maxHeight:  400,
              fit:        'inside',   // crop නැහැ — face cut නෑ
              lossless:   true,
              effort:     6,
              smartDeblock: true,
              exact:      true,       // PNG alpha channel preserve
            },

            'public/images/slider': {
              // ✅ FIX 2: Hero slider — CLS fix, 8:3 ratio enforce
              // FeaturedSlider.astro: img width=1200 height=450
              // aspect-[16/8] = 2:1 container
              // maxWidth 1920 = Full HD — 4K overkill for banner
              maxWidth:   1920,
              maxHeight:  720,        // 1920÷2.67 = 719 → banner ratio safe
              fit:        'inside',   // ratio preserve, no crop
              lossless:   true,
              effort:     6,
              smartDeblock: true,
              exact:      false,
            },

            'public/images/posts': {
              // ✅ FIX 3: Post thumbnails — correct display ratio
              // Posts.astro: width=445 height=230 (≈ 1.93:1)
              // SimilarPosts, AuthorSingle: same ratio
              // OG image recommended: 1200×630 (1.9:1) — SEO perfect match
              maxWidth:   1200,
              maxHeight:  630,        // 1.9:1 ratio — OG image standard
              fit:        'inside',
              lossless:   true,
              effort:     6,
              smartDeblock: true,
              exact:      false,
            },

          };

          const DEFAULT_PROFILE = {
            // General images (logo, favicon, etc.)
            maxWidth:   1920,
            maxHeight:  1080,
            fit:        'inside',
            lossless:   true,
            effort:     6,
            smartDeblock: true,
            exact:      true,        // logo/icon alpha preserve
          };

          // ── Recursive finder — JPG/PNG ONLY ──────────────────────────────
          // ✅ FIX 4: .webp files skip — already converted files safe
          function findImages(dir) {
            const results = [];
            if (!existsSync(dir)) return results;
            for (const entry of readdirSync(dir, { withFileTypes: true })) {
              const full = join(dir, entry.name);
              if (entry.isDirectory()) {
                results.push(...findImages(full));
              } else if (/\.(jpg|jpeg|png)$/i.test(entry.name)) {
                // ✅ Skip if WebP version already exists (duplicate run protection)
                const webpVersion = full.replace(/\.(jpg|jpeg|png)$/i, '.webp');
                if (existsSync(webpVersion)) {
                  console.log(`⏭️  WebP already exists, skipping: ${full}`);
                  continue;
                }
                results.push(full);
              }
            }
            return results;
          }

          // ── Profile matcher ───────────────────────────────────────────────
          function getProfile(filePath) {
            // Normalize path separators (Windows safety)
            const normalized = filePath.replace(/\\/g, '/');
            let best = null, bestLen = 0;
            for (const [key, prof] of Object.entries(PROFILE)) {
              if (normalized.startsWith(key) && key.length > bestLen) {
                best = prof; bestLen = key.length;
              }
            }
            return best ?? DEFAULT_PROFILE;
          }

          // ── Convert ───────────────────────────────────────────────────────
          async function convert(input) {
            const out = input.replace(/\.(jpg|jpeg|png)$/i, '.webp');
            const prof = getProfile(input);

            try {
              const meta = await sharp(input).metadata();
              const srcW = meta.width  ?? 0;
              const srcH = meta.height ?? 0;

              // ── Pipeline ────────────────────────────────────────────────
              let pipe = sharp(input)
                // EXIF rotation fix — phone photos
                .autoOrient()
                // ICC color profile preserve — color accuracy
                .keepIccProfile();

              // ✅ FIX 2 & 3: Always apply resize with fit option
              // withoutEnlargement ensures small images never upscale
              const fitMode = prof.fit ?? 'inside';
              pipe = pipe.resize(
                prof.maxWidth  ?? undefined,
                prof.maxHeight ?? undefined,
                {
                  fit:                fitMode,
                  kernel:             sharp.kernel.lanczos3,
                  withoutEnlargement: true,
                }
              );

              // ── WebP encode — official best settings ────────────────────
              pipe = pipe.webp({
                lossless:     true,
                effort:       6,
                smartDeblock: true,
                exact:        prof.exact ?? false,
              });

              await pipe.toFile(out);

              // ── Verify output file is valid ──────────────────────────────
              if (!existsSync(out) || statSync(out).size === 0) {
                console.error(`❌  Verify failed, original kept: ${input}`);
                if (existsSync(out)) unlinkSync(out);
                return;
              }

              const inKB  = (statSync(input).size / 1024).toFixed(0);
              const outKB = (statSync(out).size   / 1024).toFixed(0);
              const saved = statSync(input).size - statSync(out).size;
              const pct   = ((saved / statSync(input).size) * 100).toFixed(1);
              const sizeTag = saved >= 0 ? `${pct}% smaller` : `${Math.abs(Number(pct))}% larger (lossless)`;

              unlinkSync(input);
              console.log(`✅  [${srcW}×${srcH}→max ${prof.maxWidth ?? '∞'}×${prof.maxHeight ?? '∞'}] ${inKB}KB → ${outKB}KB (${sizeTag}) — ${out}`);

            } catch (e) {
              console.error(`❌  Failed (original kept): ${input} — ${e.message}`);
              // Clean up incomplete output
              if (existsSync(out)) unlinkSync(out);
            }
          }

          // ── Main ──────────────────────────────────────────────────────────
          const images = findImages('public');
          if (images.length === 0) {
            console.log('ℹ️  No new JPG/PNG found — all already converted or nothing to do.');
          } else {
            console.log(`\n🖼  Found ${images.length} new image(s) to convert…\n`);
            for (const img of images) await convert(img);
            console.log('\n✨  Done.\n');
          }
          EOF

      - name: Commit
        run: |
          git config user.name  "actions-user"
          git config user.email "actions@github.com"
          git add -A public/
          # ✅ FIX 5: Timestamp in commit message — audit trail & debugging
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          git diff --staged --quiet && echo "ℹ️  Nothing to commit — all images already optimized." || \
            git commit -m "Auto: JPG/PNG → lossless WebP | smartDeblock + ICC + autoOrient | ${TIMESTAMP}"
          git push

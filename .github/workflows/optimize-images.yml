name: Optimize All Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Sharp
        run: |
          mkdir -p /tmp/sharp-tool
          cd /tmp/sharp-tool
          npm init -y
          npm install sharp

      - name: Re-optimize ALL WebP + convert remaining JPG/PNG (max clarity)
        run: |
          node --input-type=module << 'EOF'
          import { createRequire } from 'module';
          const require = createRequire('/tmp/sharp-tool/package.json');
          const sharp = require('sharp');
          import {
            readdirSync, existsSync, unlinkSync, statSync
          } from 'fs';
          import { join } from 'path';

          // ═══════════════════════════════════════════════════════════════════
          // CLARITY-FIRST PROFILES
          // නීතිය: resize නොකරනවා (withoutEnlargement), modulate/linear නැහැ,
          //         sharpen minimal, lossless=true සෑම විටම, effort=4 (speed>compression)
          // ═══════════════════════════════════════════════════════════════════

          const PROFILE = {

            // Author thumbnails — pixel-perfect, no resize beyond source
            'public/images/authors': {
              maxWidth: 240,          // 2x for retina, but never upscale
              maxHeight: 240,
              fit: 'cover',
              lossless: true,         // zero quality loss
              nearLossless: false,
              quality: 100,
              effort: 3,              // low effort = less aggressive compression
              // Subtle unsharp mask — recover JPEG compression softness only
              sharpen: { sigma: 0.5, m1: 0.5, m2: 0.0, x1: 3, y2: 15, y3: 15 },
            },

            // Slider — full HD, lossless
            'public/images/slider': {
              maxWidth: 1920,
              maxHeight: 720,
              fit: 'inside',
              lossless: true,
              nearLossless: false,
              quality: 100,
              effort: 3,
              sharpen: { sigma: 0.4, m1: 0.4, m2: 0.0, x1: 3, y2: 15, y3: 15 },
            },

            // Post images — near-lossless (visually lossless but smaller file)
            'public/images/posts': {
              maxWidth: 1200,
              maxHeight: null,
              fit: 'inside',
              lossless: false,
              nearLossless: true,     // WebP near-lossless = visually perfect
              quality: 100,           // near-lossless quality=100 = best
              effort: 3,
              sharpen: { sigma: 0.4, m1: 0.4, m2: 0.0, x1: 3, y2: 15, y3: 15 },
            },
          };

          // Unknown folders — safe near-lossless
          const DEFAULT_PROFILE = {
            maxWidth: 1920,
            maxHeight: null,
            fit: 'inside',
            lossless: false,
            nearLossless: true,
            quality: 100,
            effort: 3,
            sharpen: { sigma: 0.4, m1: 0.4, m2: 0.0, x1: 3, y2: 15, y3: 15 },
          };

          // ═══════════════════════════════════════════════════════════════════
          // RECURSIVE FINDER — .jpg .jpeg .png .webp සියල්ල
          // ═══════════════════════════════════════════════════════════════════
          function findImages(dir) {
            const results = [];
            if (!existsSync(dir)) return results;
            for (const entry of readdirSync(dir, { withFileTypes: true })) {
              const full = join(dir, entry.name);
              if (entry.isDirectory()) {
                results.push(...findImages(full));
              } else if (/\.(jpg|jpeg|png|webp)$/i.test(entry.name)) {
                results.push(full);
              }
            }
            return results;
          }

          // ═══════════════════════════════════════════════════════════════════
          // PROFILE MATCHER
          // ═══════════════════════════════════════════════════════════════════
          function getProfile(filePath) {
            let best = null, bestLen = 0;
            for (const [key, prof] of Object.entries(PROFILE)) {
              if (filePath.startsWith(key) && key.length > bestLen) {
                best = prof;
                bestLen = key.length;
              }
            }
            return best ?? DEFAULT_PROFILE;
          }

          // ═══════════════════════════════════════════════════════════════════
          // CONVERT / RE-OPTIMIZE
          // ═══════════════════════════════════════════════════════════════════
          async function convert(input) {
            const isWebP = /\.webp$/i.test(input);
            // Output path: always .webp
            const out = isWebP
              ? input + '.tmp.webp'                          // temp file for in-place rewrite
              : input.replace(/\.(jpg|jpeg|png)$/i, '.webp');

            const prof = getProfile(input);

            try {
              const meta = await sharp(input).metadata();
              const srcW = meta.width  ?? 9999;
              const srcH = meta.height ?? 9999;

              // Only resize DOWN — never enlarge
              const targetW = prof.maxWidth  ? Math.min(srcW, prof.maxWidth)  : undefined;
              const targetH = prof.maxHeight ? Math.min(srcH, prof.maxHeight) : undefined;

              const needsResize = (targetW && targetW < srcW) || (targetH && targetH < srcH);

              let pipe = sharp(input, { sequentialRead: true });

              // ── Resize ONLY if source is larger than target ──
              if (needsResize) {
                pipe = pipe.resize(targetW, targetH ?? undefined, {
                  fit: prof.fit,
                  kernel: sharp.kernel.lanczos3,
                  withoutEnlargement: true,
                });
              }

              // ── Minimal unsharp mask (recover JPEG/WebP decode softness) ──
              // ❌ NO modulate, NO linear — color/brightness unmodified
              pipe = pipe.sharpen(prof.sharpen);

              // ── WebP encode ──
              pipe = pipe.webp({
                quality:      prof.quality,
                lossless:     prof.lossless,
                nearLossless: prof.nearLossless,
                effort:       prof.effort,
                smartSubsample: false,   // ❌ OFF — chroma subsampling = color blur
              });

              await pipe.toFile(out);

              if (!existsSync(out) || statSync(out).size === 0) {
                console.error(`❌  Output verify failed, original kept: ${input}`);
                if (existsSync(out)) unlinkSync(out);
                return;
              }

              if (isWebP) {
                // Replace original with re-optimized version
                unlinkSync(input);
                const { renameSync } = await import('fs');
                renameSync(out, input);
                console.log(`🔄  Re-optimized: ${input}`);
              } else {
                unlinkSync(input);
                console.log(`✅  ${input}  →  ${out}`);
              }

            } catch (e) {
              console.error(`❌  Failed (original kept): ${input}  —  ${e.message}`);
              if (existsSync(out)) unlinkSync(out);
            }
          }

          // ═══════════════════════════════════════════════════════════════════
          // MAIN
          // ═══════════════════════════════════════════════════════════════════
          const images = findImages('public');
          console.log(`\n🖼  Found ${images.length} image(s) — starting clarity-optimized conversion…\n`);
          for (const img of images) {
            await convert(img);
          }
          console.log('\n✨  All done.\n');
          EOF

      - name: Commit results
        run: |
          git config user.name  "actions-user"
          git config user.email "actions@github.com"
          git add -A public/
          git diff --staged --quiet && echo "Nothing to commit." || \
            git commit -m "Auto: re-optimize WebP clarity (lossless/near-lossless, no color shift)"
          git push

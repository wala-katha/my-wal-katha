name: Optimize Author Images

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Sharp in temp folder
        run: |
          mkdir -p /tmp/sharp-tool
          cd /tmp/sharp-tool
          npm init -y
          npm install sharp

      - name: Resize all images
        run: |
          node --input-type=module << 'EOF'
          import { createRequire } from 'module';
          const require = createRequire('/tmp/sharp-tool/package.json');
          const sharp = require('sharp');
          import { readdirSync } from 'fs';

          const folders = [
            { dir: 'public/images/authors', width: 400, height: 400 },
            { dir: 'public/images/slider', width: 1920, height: 720 },
          ];

          for (const { dir, width, height } of folders) {
            for (const file of readdirSync(dir)) {
              if (/\.(jpg|jpeg|png)$/i.test(file)) {
                const out = dir + '/' + file.replace(/\.[^.]+$/, '.webp');
                await sharp(dir + '/' + file)
                  .resize(width, height, {
                    fit: 'cover',
                    kernel: sharp.kernel.lanczos3,
                    fastShrinkOn: false,
                  })
                  .webp({
                    quality: 100,
                    lossless: true,
                    effort: 6,
                    smartSubsample: true,
                  })
                  .toFile(out);
                console.log('Done:', dir + '/' + file, '->', out);
              }
            }
          }
          EOF

      - name: Commit optimized images
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/images/authors/*.webp
          git add public/images/slider/*.webp
          git diff --staged --quiet || git commit -m "Auto: optimize all images lossless WebP"
          git push
